<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SkyTycoon | Arnav Game Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
</head>
<body>
<div class="stars"></div>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="index.html">
      <span class="logo">✈️</span>
      <span><b>SkyTycoon</b><small>Arnav Game Studios</small></span>
    </a>
    <nav class="nav-links"><a href="index.html">← Home</a></nav>
  </div>
</header>

<main class="center-stage">
  <div class="auth-card">
    <h2 id="authTitle">Welcome back, Captain</h2>
    <p class="lead" id="authLead">Sign in to board your airline empire.</p>

    <div class="field" id="nameField" style="display:none">
      <label>Airline CEO Name</label>
      <input id="name" type="text" placeholder="e.g. Arnav Rival" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" style="width:100%" id="submitBtn">Sign In</button>

    <div class="divider">or</div>
    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 5.1 29.4 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 5.1 29.4 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35.9 26.7 37 24 37c-5.3 0-9.7-2.6-11.3-6.9l-6.5 5C9 41.3 16 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.9 35.9 44 30.6 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
      Continue with Google
    </button>

    <div class="switch-line" id="switchLine">
      New here? <a id="switchBtn">Create your airline →</a>
    </div>

    <div class="msg" id="msg"></div>
    <div class="mode-note" id="modeNote"></div>
  </div>
</main>

<!-- Firebase SDK (compat). Safe to load even in Demo Mode. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/storage.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
